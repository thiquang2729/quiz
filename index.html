<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Trắc Nghiệm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Bài Trắc Nghiệm</h1>
        
        <div id="setup-section">
            <p>Quiz Tin học</p>
            <button id="start-btn" class="option-btn" style="background-color: var(--primary-color); color: white; border-radius: 8px; font-weight: bold; padding: 12px 24px; text-align: center;">Bắt Đầu</button>
        </div>

        <div id="quiz-section" class="hidden">
            <div class="score-tracker">
                Câu đúng: <span id="correct-score">0</span> / <span id="total-questions">0</span>
            </div>
            
            <div class="question-container">
                <h2 id="question-text">Đang tải câu hỏi...</h2>
                <div class="options-container" id="options-container">
                    <!-- Buttons will be generated here -->
                </div>
            </div>

            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button id="next-btn" class="hidden" style="flex: 1;">Câu Tiếp Theo</button>
                <button id="abort-btn" style="flex: 1; background-color: #e74c3c;">Về Màn Hình Chính</button>
            </div>
        </div>

        <div id="result-section" class="hidden">
            <h2>Kết thúc bài trắc nghiệm!</h2>
            <p>Số câu trả lời đúng:</p>
            <h3 id="final-score">0 / 0</h3>
            <button id="restart-btn">Làm Lại</button>
            <button id="new-file-btn" style="margin-left: 10px; background-color: #7f8c8d;">Chọn File Khác</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
